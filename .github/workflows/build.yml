name: Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up MSVC compiler
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build DLL tray_resizer_dll.dll
      shell: cmd
      run: |
        cd /d "%GITHUB_WORKSPACE%\source"
        cl /EHsc /MD /LD /std:c++20 /Zc:preprocessor /nologo ^
            tray_resizer_dll.cpp ^
            buffer.c hook.c trampoline.c hde64.c ^
            /Fe:tray_resizer_dll.dll ^
            /I"%WindowsSdkDir%Include\%WindowsSDKVersion%\cppwinrt" ^
            /link windowsapp.lib ole32.lib oleaut32.lib runtimeobject.lib

    - name: Build injector tray_resizer.exe
      shell: cmd
      run: |
        cd /d "%GITHUB_WORKSPACE%\source"
        "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /platform:x64 /nologo /out:tray_resizer.exe tray_resizer.cs

    - name: Build unloader tray_unloader.exe
      shell: cmd
      run: |
        cd /d "%GITHUB_WORKSPACE%\source"
        "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /platform:x64 /nologo /out:tray_unloader.exe tray_unloader.cs

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tray-resizer-24px
        path: |
          source/tray_resizer_dll.dll
          source/tray_resizer.exe
          source/tray_unloader.exe
        if-no-files-found: error
